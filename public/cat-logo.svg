<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ears -->
  <polygon points="6,26 14,4 26,22"  fill="#ffa500"/>
  <polygon points="58,26 50,4 38,22" fill="#ffa500"/>
  <!-- Inner ear detail -->
  <polygon points="10,23 15,9  23,21"  fill="white" fill-opacity="0.35"/>
  <polygon points="54,23 49,9  41,21" fill="white" fill-opacity="0.35"/>
  <!-- Face -->
  <circle cx="32" cy="36" r="24" fill="#ffa500"/>
  <!-- Eyes -->
  <ellipse cx="22" cy="32" rx="4"   ry="4.5" fill="white"/>
  <ellipse cx="23" cy="32.5" rx="2.2" ry="2.8" fill="#1a1a1a"/>
  <circle  cx="24" cy="31"   r="0.9" fill="white"/>
  <ellipse cx="42" cy="32" rx="4"   ry="4.5" fill="white"/>
  <ellipse cx="43" cy="32.5" rx="2.2" ry="2.8" fill="#1a1a1a"/>
  <circle  cx="44" cy="31"   r="0.9" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="2.8" ry="2" fill="white" fill-opacity="0.85"/>
  <!-- Mouth -->
  <path d="M29 43 Q32 46.5 35 43" stroke="white" stroke-width="1.4" stroke-linecap="round" fill="none" stroke-opacity="0.85"/>
  <!-- Whiskers -->
  <line x1="8"  y1="39" x2="26" y2="41" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="8"  y1="43" x2="26" y2="43" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="38" y1="41" x2="56" y2="39" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.6"/>
  <line x1="38" y1="43" x2="56" y2="43" stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.6"/>
</svg>
